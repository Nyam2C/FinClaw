# docker-compose.yml — server + web 동시 기동 (pnpm run dev:all)

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: finclaw:local
    container_name: finclaw-server
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - FINCLAW_HOST=0.0.0.0
      - FINCLAW_PORT=3000
      - FINCLAW_DB_PATH=/data/db.sqlite
    ports:
      - '${FINCLAW_PORT:-3000}:3000'
    volumes:
      - finclaw-data:/data
    command: ['node', 'packages/server/dist/main.js']

  web:
    image: finclaw:local
    container_name: finclaw-web
    restart: unless-stopped
    init: true
    depends_on:
      - server
    ports:
      - '${FINCLAW_WEB_PORT:-5173}:5173'
    # Dockerfile의 HEALTHCHECK는 /healthz(server) 가정 — web에는 해당 엔드포인트 없으므로 비활성화
    healthcheck:
      disable: true
    # `pnpm exec`로 vite를 직접 호출 — script layer의 `--` 구분자 문제 회피
    command:
      - pnpm
      - --filter
      - '@finclaw/web'
      - exec
      - vite
      - preview
      - --host
      - 0.0.0.0
      - --port
      - '5173'

volumes:
  finclaw-data:
    driver: local
